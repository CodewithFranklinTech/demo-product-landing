<!DOCTYPE html>
<html>

<head>
  <title>Demo Product Landing Page</title>

  <!-- Correct Amplitude SDK -->
  <script src="https://cdn.amplitude.com/libs/analytics-browser-2.11.0-min.js.gz"></script>
  <script>
    window.amplitude = window.amplitude || [];
    amplitude._q = amplitude._q || [];

    amplitude.init = function(apiKey){
      amplitude._q.push(["init", apiKey]);
    };

    amplitude.track = function(eventName){
      amplitude._q.push(["track", eventName]);
    };

    amplitude.init("98c79f3d77f828118a4ea6d2ca65d9f3");
  </script>
</head>

<body style="text-align:center; font-family: Arial; padding:50px;">

  <h1>Welcome to My Demo Product</h1>
  <p>This page is used for product analytics testing.</p>

  <button onclick="trackSignUp()">Sign Up</button>

  <br><br>

  <button onclick="trackDemo()">Request Demo</button>

  <script>
    function trackSignUp() {
      amplitude.track("sign_up_click");
      alert("Sign Up Clicked");
    }

    function trackDemo() {
      amplitude.track("request_demo_click");
      alert("Request Demo Clicked");
    }
  </script>

</body>
</html>
