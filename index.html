<!DOCTYPE html>
<html>
<head>
  <title>Demo Product Landing Page</title>

  <!-- Amplitude Auto Tracking Script -->
  <script src="https://cdn.amplitude.com/script/98c79f3d77f828118a4ea6d2ca65d9f3.js"></script>
  <script>
    window.amplitude.add(window.sessionReplay.plugin({sampleRate: 1}));
    window.amplitude.init('98c79f3d77f828118a4ea6d2ca65d9f3', {
      fetchRemoteConfig: true,
      autocapture: {
        pageViews: true,
        elementInteractions: true
      }
    });
  </script>
</head>
<body style="text-align:center; font-family: Arial; padding:50px;">

  <h1>Welcome to My Demo Product</h1>
  <p>This page is used for product analytics testing.</p>

  <button onclick="trackSignUp()">Sign Up</button>

  <br><br>

  <button onclick="trackDemo()">Request Demo</button>

  <script>
    function trackSignUp() {
      amplitude.logEvent("sign_up_click");
      alert("Sign Up Clicked");
    }

    function trackDemo() {
      amplitude.logEvent("request_demo_click");
      alert("Request Demo Clicked");
    }
  </script>

</body>
</html>
